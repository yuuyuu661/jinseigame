<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生ゲーム</title>

<style>
body {

  margin: 0;
  min-height: 100vh;

  font-family: system-ui, sans-serif;
  color: #3b2400;

  background-image:
    url("/static/images/bg_room.png");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;

  overflow-x: hidden;
  overflow-y: auto;
}

.overlay{

  position: fixed;
  inset: 0;

  background:
    rgba(255,255,255,0.15);

  backdrop-filter: blur(2px);

  pointer-events: none;

  z-index: 0;
}

.wrap {

  position: relative;
  z-index: 1;

  max-width: 1300px;
  margin: auto;
  padding: 24px;
}

.title {
  text-align: center;
  font-size: 2rem;
  font-weight: 900;
  margin-bottom: 18px;
}

.board-view {

  width: 100%;

  position: relative;

  overflow: hidden;

  aspect-ratio: 16 / 10;

}

.board {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 10;
  background:
    radial-gradient(circle at 20% 20%, #fff9c4, transparent 22%),
    radial-gradient(circle at 80% 70%, #b3e5fc, transparent 24%),
    linear-gradient(135deg, #fff176, #ffca28);
  border: 10px solid #2e7d32;
  border-radius: 28px;
  box-shadow: 0 16px 40px rgba(0,0,0,.25);
  overflow: hidden;
}
  


.board-decoration{

  position: absolute;

  transform:
    translate(-50%, -50%);

  z-index: 1;

  pointer-events: none;

  user-select: none;
}

.tile {
  position: absolute;
  width: 5%;
  height: 6%;
  z-index: 2;
  border-radius: 14px;
  border: 2px solid #7a4b00;
  background: #ffe45c;
  box-shadow: inset 0 -4px rgba(0,0,0,.12);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4px;
  font-size: .62rem;
  font-weight: 800;
  line-height: 1.15;
}

.tile.start {

  background:
    linear-gradient(
      135deg,
      #ff4fd8,
      #ff7aa8,
      #7ad7ff
    );

  color: white;

  border: 3px solid white;

  box-shadow:
    0 0 16px rgba(255,255,255,.7),
    0 0 30px rgba(255,0,180,.5);

  transform: scale(1.12);

  font-size: .85rem;

}

.tile.goal {

  background:
    linear-gradient(
      135deg,
      #ff4d4d,
      #ff9a3c,
      #ffe14d,
      #5cff7a,
      #4dc3ff,
      #7a5cff,
      #ff66d9
    );

  background-size: 400% 400%;

  animation:
    rainbowMove 6s linear infinite;

  color: white;

  border: 3px solid white;

  transform: scale(1.18);

  box-shadow:
    0 0 20px rgba(255,255,255,.8),
    0 0 40px rgba(255,255,255,.5);

  font-size: .8rem;

}

.tile.prize {
  background: linear-gradient(#fff176, #ffd54f);
}

.tile.menu {
  background: linear-gradient(#81d4fa, #4fc3f7);
}

.tile.bad {
  background: linear-gradient(#ffab91, #ff7043);
}

.tile.empty {
  background: #fff9c4;
  color: #8d6e63;
}

.player {
  position: absolute;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: #e91e63;
  border: 4px solid #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,.35);
  z-index: 5;
  transform: translate(-50%, -50%);
}

.control {
  margin-top: 24px;
  background: rgba(255,255,255,.85);
  border-radius: 22px;
  padding: 24px;
  text-align: center;
  box-shadow: 0 10px 26px rgba(0,0,0,.18);
}
.path-line {
  position: absolute;
  height: 6px;
  background: #111;
  opacity: .5;
  border-radius: 999px;
  transform-origin: left center;
  z-index: 0;
  box-shadow:
    0 0 8px rgba(255,255,255,.3);

}
.dice {
  width: 120px;
  height: 120px;
  margin: 0 auto 16px;
}

.dice img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.dice.shake {
  animation: shake .08s infinite;
}

@keyframes shake {
  0% { transform: rotate(0deg) translate(0,0); }
  25% { transform: rotate(8deg) translate(3px,-3px); }
  50% { transform: rotate(-8deg) translate(-3px,3px); }
  75% { transform: rotate(6deg) translate(2px,2px); }
  100% { transform: rotate(0deg) translate(0,0); }
}

button {
  border: none;
  border-radius: 999px;
  padding: 14px 34px;
  font-size: 1.1rem;
  font-weight: 900;
  background: linear-gradient(#ffecb3, #ff9800);
  color: #3b2400;
  cursor: pointer;
  box-shadow: 0 6px 0 #bf6d00;
}

button:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 #bf6d00;
}
#diceCountText {

  margin-top: 18px;

  font-size: 1.15rem;

  font-weight: 900;

  color: #5d3200;

}

.result {
  margin-top: 16px;
  font-size: 1.1rem;
  font-weight: 800;
}

@keyframes rainbowMove {

  0% {
    background-position: 0% 50%;
  }

  100% {
    background-position: 100% 50%;
  }

}

@media (max-width: 700px) {

  .board {

    width: 180vw;

    max-width: none;

    touch-action: none;

    transform-origin: top left;

  }

}
  
</style>
</head>

<body>

<div class="overlay"></div>

<div class="wrap">
  <div class="title">🎲 人生ゲーム 🎲</div>


    <div class="board-view">

      <div class="board" id="board">
        <div class="player" id="player"></div>
      </div>

    </div>

    <div class="control">
    <div style="margin-bottom:12px;">

      🔍 ズーム

      <input
        type="range"
        id="zoomSlider"
        min="1"
        max="4"
        step="0.1"
        value="1"
      >

    </div>
    <div class="dice">
      <img
        id="diceImage"
        src="/static/dice/1.png"
      >
    </div>
    <button id="rollBtn">サイコロを振る</button>
    <div id="diceCountText">
      サイコロ所持数: 0
    </div>
    <div class="result" id="result">スタート！</div>
  </div>
</div>

<script>
const prizes = [
  "思い出photo<br>イタズラ落書き 半額",
  "ボトルⓜⓔⓝⓤ無料",
  "特別席無料",
  "指名料無料"
];

const menus = [
  "語尾もふもふ",
  "叱咤激励",
  "セリフ読み",
  "甘えん坊",
  "ぷんぷん",
  "愛の告白",
  "愛してるゲーム",
  "イベント特典画像<br>プレゼント",
  "イベントカード<br>プレゼント",
  "オリシャンプレゼント"
];

const bads = [
  "1マス進む",
  "2マス戻る",
  "🎲1回休み",
  "大好き〜と叫ぶ",
  "語尾にゃんで<br>お話する",
  "ドリンクを1つ頼む"
];

const diceSound = new Audio(
  "/static/sounds/dice_roll.mp3"
);

const bgm = new Audio(
  "/static/sounds/poppop.mp3"
);

bgm.loop = true;
bgm.volume = 0.25;

const board = document.getElementById("board");
const player = document.getElementById("player");
const diceEl = document.querySelector(".dice");
const diceImage = document.getElementById("diceImage");
const result = document.getElementById("result");
const rollBtn = document.getElementById("rollBtn");

let position = 0;
let tiles = [];
let diceCount = 0;

const API_BASE =
  "https://yomiage-production.up.railway.app";

const params =
  new URLSearchParams(window.location.search);

const roomId =
  params.get("room");

const session =
  params.get("session");

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function makeTileData() {
  const data = [];

  data.push({ type: "start", text: "スタート" });

  const prizeTiles = [];
  const menuTiles = [];
  const badTiles = [];
  const emptyTiles = [];

  for (let i = 0; i < 10; i++) {
    prizeTiles.push({
      type: "prize",
      text: prizes[i % prizes.length]
    });
  }

  for (let i = 0; i < 40; i++) {
    menuTiles.push({
      type: "menu",
      text: menus[i % menus.length]
    });
  }

  for (let i = 0; i < 15; i++) {
    badTiles.push({
      type: "bad",
      text: bads[i % bads.length]
    });
  }

  for (let i = 0; i < 33; i++) {
    emptyTiles.push({
      type: "empty",
      text: "何もなし"
    });
  }

  const middle = shuffle([
    ...prizeTiles,
    ...menuTiles,
    ...badTiles,
    ...emptyTiles
  ]);

  data.push(...middle);
  data.push({ type: "goal", text: "ゴール" });

  return data;
}

function getPathPositions() {

  return [

// =========================
// スタート
// =========================
    { x: 6,  y: 84 },
    { x: 13, y: 84 },
    { x: 20, y: 84 },
    { x: 27, y: 84 },
    { x: 34, y: 84 },

    { x: 41, y: 84 },
    { x: 48, y: 84 },
    { x: 55, y: 84 },
    { x: 62, y: 84 },
    { x: 69, y: 84 },

// =========================
// カープ
// =========================
    { x: 76, y: 84 },
    { x: 83, y: 84 },
    { x: 90, y: 84 },
    { x: 90, y: 75 },
    { x: 90, y: 66 },

    { x: 90, y: 57 },
    { x: 90, y: 48 },
    { x: 90, y: 39 },
    { x: 90, y: 30 },
    { x: 90, y: 21 },
    { x: 90, y: 12 },
    { x: 90, y: 3 },

// =========================
// カープ
// =========================
    { x: 83, y: 3 },
    { x: 76, y: 3 },
    { x: 69, y: 3 },
    { x: 62, y: 3 },
    { x: 55, y: 3 },

    { x: 48, y: 3 },
    { x: 41, y: 3 },
    { x: 34, y: 3 },
    { x: 27, y: 3 },
    { x: 20, y: 3 },
    { x: 13, y: 3 },
    { x: 6, y: 3 },


// =========================
// カープ
// =========================

    { x: 6, y: 12 },
    { x: 6, y: 21 },
    { x: 6, y: 30 },
    { x: 6, y: 39 },
    { x: 6, y: 48 },
    { x: 6, y: 57 },
    { x: 6, y: 66 },
    { x: 6, y: 75 },

// =========================
// カープ
// =========================

    { x: 13, y: 75 },
    { x: 20, y: 75 },
    { x: 27, y: 75 },
    { x: 34, y: 75 },
    { x: 41, y: 75 },
    { x: 48, y: 75 },
    { x: 55, y: 75 },
    { x: 62, y: 75 },
    { x: 69, y: 75 },
    { x: 76, y: 75 },
    { x: 83, y: 75 },



// =========================
// カープ
// =========================

    { x: 83, y: 66 },
    { x: 83, y: 57 },
    { x: 83, y: 48 },
    { x: 83, y: 39 },
    { x: 83, y: 30 },
    { x: 83, y: 21 },
    { x: 83, y: 12 },

// =========================
// カープ
// =========================

    { x: 77, y: 12 },
    { x: 70, y: 12 },
    { x: 63, y: 12 },
    { x: 57, y: 12 },
    { x: 50, y: 12 },
    { x: 43, y: 12 },
    { x: 36, y: 12 },
    { x: 29, y: 12 },
    { x: 22, y: 12 },
    { x: 15, y: 12 },

// =========================
// カープ
// =========================

    { x: 15, y: 21 },
    { x: 15, y: 30 },
    { x: 15, y: 39 },
    { x: 15, y: 48 },
    { x: 15, y: 57 },
    { x: 15, y: 66 },

// =========================
// カープ
// =========================

    { x: 22, y: 66 },
    { x: 29, y: 66 },
    { x: 36, y: 66 },
    { x: 43, y: 66 },
    { x: 50, y: 66 },
    { x: 57, y: 66 },
    { x: 64, y: 66 },
    { x: 71, y: 66 },

// =========================
// カープ
// =========================

    { x: 71, y: 57 },
    { x: 71, y: 48 },
    { x: 71, y: 39 },
    { x: 71, y: 30 },

// =========================
// カープ
// =========================

    { x: 64, y: 30 },
    { x: 57, y: 30 },
    { x: 50, y: 30 },
    { x: 43, y: 30 },
    { x: 36, y: 30 },
    { x: 29, y: 30 },
    { x: 22, y: 30 },

// =========================
// カープ
// =========================

    { x: 22, y: 39 },
    { x: 22, y: 48 },
    { x: 22, y: 57 },


// =========================
// カープ
// =========================

    { x: 29, y: 57 },

// =========================
// ゴール
// =========================

    { x: 36, y: 48 },

  ];

}

function renderBoard() {

  tiles = makeTileData();



  const positions = getPathPositions();

  const decorations =
    getDecorationPositions();

  decorations.forEach(deco => {

    const img =
      document.createElement("img");

    img.src = deco.image;

    img.className =
      "board-decoration";

    img.style.left =
      deco.x + "%";

    img.style.top =
      deco.y + "%";

    img.style.width =
      deco.width + "%";

    board.appendChild(img);

  });

  // =========================
  // 線を生成
  // =========================

  for (let i = 0; i < positions.length - 1; i++) {

    const p1 = positions[i];
    const p2 = positions[i + 1];

    const line = document.createElement("div");

    line.className = "path-line";

    // =========================
    // マスサイズ
    // =========================

    const tileWidth = 5;
    const tileHeight = 6;

    // =========================
    // マス中心座標
    // =========================

    const startX = p1.x + tileWidth / 2;
    const startY = p1.y + tileHeight / 2;

    const endX = p2.x + tileWidth / 2;
    const endY = p2.y + tileHeight / 2;

    // =========================
    // 差分
    // =========================

    const dx = endX - startX;
    const dy = endY - startY;

    // =========================
    // 長さ
    // =========================

    const length = Math.sqrt(
      dx * dx + dy * dy
    );

    // =========================
    // 角度
    // =========================

    const angle =
      Math.atan2(dy, dx) * 180 / Math.PI;

    // =========================
    // 線長調整
    // =========================

    line.style.width =
      `${length * 0.72}%`;

    // =========================
    // 開始位置
    // =========================

    line.style.left = `${startX}%`;
    line.style.top = `${startY}%`;

    line.style.transform =
      `rotate(${angle}deg)`;

    board.appendChild(line);

  }

  // =========================
  // マス生成
  // =========================

  tiles.forEach((tile, index) => {

    const div = document.createElement("div");

    div.className = `tile ${tile.type}`;

    div.innerHTML = tile.text;

    if (tile.type === "goal") {

      div.innerHTML = "🥂<br>GOAL";

    }

    div.style.left =
      positions[index].x + "%";

    div.style.top =
      positions[index].y + "%";

    board.appendChild(div);

  });

  movePlayer();

}


function getDecorationPositions(){

  return [

    {
      x: 45,
      y: 42,
      width: 18,
      image: "/static/images/castle.png"
    },

    {
      x: 70,
      y: 18,
      width: 12,
      image: "/static/images/star.png"
    }

  ];

}

function movePlayer() {
  const positions = getPathPositions();
  const p = positions[position];

  player.style.left = p.x + "%";
  player.style.top = p.y + "%";
}

function applyTileEffect(tile) {
  if (tile.type === "bad") {
    if (tile.text.includes("1マス進む")) {
      position = Math.min(position + 1, 99);
      movePlayer();
    }

    if (tile.text.includes("2マス戻る")) {
      position = Math.max(position - 2, 0);
      movePlayer();
    }
  }
}

rollBtn.addEventListener("click", () => {

  diceSound.currentTime = 0;
  diceSound.play();

  rollBtn.disabled = true;
  diceEl.classList.add("shake");

  let count = 0;
  const interval = setInterval(async () => {
    const temp = Math.floor(Math.random() * 6) + 1;
    diceImage.src = `/static/dice/${temp}.png`;
    count++;

    if (count >= 18) {
      clearInterval(interval);

      const res = await fetch(

        `${API_BASE}/api/life/roll/${roomId}?session=${session}`,

        {
          method: "POST"
        }

      );

      const data = await res.json();

      if (data.error === "no dice") {

        result.innerHTML =
          "サイコロがありません";

        diceEl.classList.remove("shake");

        rollBtn.disabled = false;

        clearInterval(interval);

        return;
      }

      const dice = data.dice;

      position = data.position;

      diceCount =
        data.dice_count || 0;

      document.getElementById(
        "diceCountText"
      ).innerText =
        `サイコロ所持数: ${diceCount}`;

      diceImage.src = `/static/dice/${dice}.png`;

      diceEl.classList.remove("shake");

      movePlayer();

      const tile = {
        type: data.tile.tile_type,
        text: data.tile.tile_text
      };

      result.innerHTML = `
        出目：${dice}<br>
        止まったマス：${tile.text}
      `;

      applyTileEffect(tile);

      if (position >= 99) {
        result.innerHTML += "<br>🎉 ゴール！";
      }

      rollBtn.disabled = false;
    }
  }, 70);
});

async function loadRoom() {

  const res = await fetch(
    `${API_BASE}/api/life/room/${roomId}`
  );

  const data = await res.json();

  tiles = data.tiles.map(t => ({
    type: t.tile_type,
    text: t.tile_text
  }));

  // =========================
  // 自分の現在位置取得
  // =========================

  const meRes = await fetch(
    `${API_BASE}/api/life/me/${roomId}?session=${session}`
  );

  const meData = await meRes.json();

  position = meData.position;

  diceCount = meData.dice_count || 0;
  document.getElementById(
    "diceCountText"
  ).innerText =
    `サイコロ所持数: ${diceCount}`;

  renderBoard();

}
document.body.addEventListener(

  "click",

  () => {

    bgm.play().catch(() => {});

  },

  { once:true }

);

const boardContainer =
  document.querySelector(".board-view");

let scale =
  window.innerWidth <= 700
    ? 0.55
    : 1;

let posX = 0;
let posY = 0;

let startDistance = 0;

let isDragging = false;

let lastX = 0;
let lastY = 0;
let isMouseDragging = false;

// =========================
// transform更新
// =========================

function updateTransform() {

  board.style.transform =
    `scale(${scale}) translate(${posX}px, ${posY}px)`;

}

// =========================
// 指2本の距離
// =========================

function getDistance(touches) {

  const dx =
    touches[0].clientX -
    touches[1].clientX;

  const dy =
    touches[0].clientY -
    touches[1].clientY;

  return Math.sqrt(dx * dx + dy * dy);

}

// =========================
// タッチ開始
// =========================

boardContainer.addEventListener(

  "touchstart",

  (e) => {

    // =====================
    // ピンチ開始
    // =====================

    if (e.touches.length === 2) {

      startDistance =
        getDistance(e.touches);

    }

    // =====================
    // ドラッグ開始
    // =====================

    if (e.touches.length === 1) {

      isDragging = true;

      lastX =
        e.touches[0].clientX;

      lastY =
        e.touches[0].clientY;

    }


  }

);

// =========================
// タッチ移動
// =========================

boardContainer.addEventListener(

  "touchmove",

  (e) => {

    e.preventDefault();

    // =====================
    // ピンチズーム
    // =====================

    if (e.touches.length === 2) {

      const currentDistance =
        getDistance(e.touches);

      const zoom =
        currentDistance / startDistance;

      scale *= zoom;

      scale = Math.max(
        0.55,
        Math.min(scale, 4)
      );

      startDistance =
        currentDistance;

      updateTransform();

    }

    // =====================
    // ドラッグ移動
    // =====================

    if (
      e.touches.length === 1 &&
      isDragging
    ) {

      const x =
        e.touches[0].clientX;

      const y =
        e.touches[0].clientY;

      posX += x - lastX;
      posY += y - lastY;

      lastX = x;
      lastY = y;

      updateTransform();

    }

  },

  { passive: false }

);

// =========================
// タッチ終了
// =========================

boardContainer.addEventListener(

  "touchend",

  () => {

    isDragging = false;

  }

);

boardContainer.addEventListener(

  "mousedown",

  (e) => {

    isMouseDragging = true;

    lastX = e.clientX;
    lastY = e.clientY;

  }

);

window.addEventListener(

  "mouseup",

  () => {

    isMouseDragging = false;

  }

);

window.addEventListener(

  "mousemove",

  (e) => {

    if (!isMouseDragging) return;

    posX += e.clientX - lastX;
    posY += e.clientY - lastY;

    lastX = e.clientX;
    lastY = e.clientY;

    updateTransform();

  }

);

const zoomSlider =
  document.getElementById(
    "zoomSlider"
  );

zoomSlider.addEventListener(

  "input",

  () => {

    scale =
      Number(
        zoomSlider.value
      );

    updateTransform();

  }

);

updateTransform();

loadRoom();
</script>

</body>
</html>
